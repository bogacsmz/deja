name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[test]"

      - name: Unit + integration tests
        run: pytest -q

      - name: Cross-phase gate (hermetic — live proofs skip without secrets)
        run: python scripts/verify_all.py --no-live
