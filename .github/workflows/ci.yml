name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[test]"

      - name: Lint + format check
        run: |
          pip install ruff==0.15.20
          ruff check .
          ruff format --check .

      - name: Unit + integration tests
        run: pytest -q

      - name: Cross-phase gate (hermetic — live proofs skip without secrets)
        run: python scripts/verify_all.py --no-live
