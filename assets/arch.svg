<path d="M1042 479 H1084" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M1042 553 H1084" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M1042 641 H1084" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>

<!-- ================= DEPLOY STRIP ================= -->
<rect x="56" y="768" width="1488" height="82" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="80" y="796" font-family="Lato" font-weight="900" font-size="14" fill="#1E1B4B">Deployment — one container, two listeners</text>
<text x="80" y="820" font-family="Lato" font-weight="400" font-size="13.5" fill="#475569">Railway · a single service runs the Socket-Mode agent and the uvicorn MCP endpoint in one event loop (bound to $PORT). Either dies → the whole container restarts.</text>
<text x="80" y="840" font-family="Lato" font-weight="400" font-size="12.5" fill="#94A3B8">deja/ engine · listeners/ Slack events · planner_bot/ the demo agent Déjà puts on trial · benchmarks/ · Apache-2.0 · github.com/bogacsmz/deja</text>

<!-- invariant -->
<rect x="56" y="866" width="1488" height="86" rx="12" fill="#1E1B4B"/>
<text x="88" y="900" font-family="Lato" font-weight="900" font-size="17" fill="#FFFFFF">The invariant: no source → INCONCLUSIVE.</text>
<text x="88" y="926" font-family="Lato" font-weight="400" font-size="15" fill="#A5B4FC">A guardrail that fabricates is worse than no guardrail at all. Every number on a card is backed by a link you can click.</text>
<text x="1074" y="900" font-family="Lato" font-weight="900" font-size="15" fill="#FFFFFF">Measured, not claimed</text>
<text x="1074" y="926" font-family="Lato" font-weight="400" font-size="14" fill="#A5B4FC">confident-wrong 0 · false CONFLICTS 0 · sourceless 0</text>
</svg>
