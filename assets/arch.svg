<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-label="Deja architecture">
<defs>
  <marker id="ai" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 1.5 L8.5 5 L0 8.5 z" fill="#4F46E5"/></marker>
  <marker id="at" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 1.5 L8.5 5 L0 8.5 z" fill="#0D9488"/></marker>
  <marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 1.5 L8.5 5 L0 8.5 z" fill="#94A3B8"/></marker>
  <marker id="aa" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 1.5 L8.5 5 L0 8.5 z" fill="#D97706"/></marker>
</defs>
<rect width="1600" height="1020" fill="#FFFFFF"/>

<!-- title -->
<g transform="translate(56,40) scale(0.6)">
  <path d="M19 15 V47" stroke="#1E1B4B" stroke-width="7.5" stroke-linecap="round" fill="none"/>
  <path d="M19 15 H27 A16 16 0 0 1 27 47 H26" stroke="#4F46E5" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="17.8,47 27,41.6 27,52.4" fill="#4F46E5" stroke="#4F46E5" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/>
</g>
<text x="96" y="70" font-family="Lato" font-weight="900" font-size="24" fill="#1E1B4B">Déjà — architecture</text>
<text x="96" y="96" font-family="Lato" font-weight="400" font-size="16" fill="#64748B">Two entry paths. One engine. A verdict is only emitted if it can be linked to a source.</text>

<!-- ================= SOURCES ================= -->
<text x="56" y="146" font-family="Lato" font-weight="900" font-size="12" letter-spacing="1.6" fill="#94A3B8">WHO PROPOSES</text>

<rect x="56" y="160" width="240" height="66" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="74" y="186" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">Human · #eng</text>
<text x="74" y="209" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">“move the job queue to Temporal”</text>

<rect x="56" y="240" width="240" height="66" rx="9" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
<text x="74" y="266" font-family="Lato" font-weight="700" font-size="15" fill="#0F766E">Agent · Planner Bot</text>
<text x="74" y="289" font-family="Lato" font-weight="400" font-size="13" fill="#0D9488">never opted in · never asked</text>

<rect x="56" y="356" width="240" height="66" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="74" y="382" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">Slackbot / any MCP agent</text>
<text x="74" y="405" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">check_decision(proposal)</text>

<!-- ================= TRANSPORT ================= -->
<text x="336" y="146" font-family="Lato" font-weight="900" font-size="12" letter-spacing="1.6" fill="#94A3B8">TRANSPORT</text>

<rect x="336" y="196" width="200" height="74" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="352" y="222" font-family="Lato" font-weight="700" font-size="14" fill="#4F46E5">Socket Mode</text>
<text x="352" y="243" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">Events API · message.*</text>
<text x="352" y="261" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">listeners/events/</text>

<rect x="336" y="356" width="200" height="88" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="352" y="382" font-family="Lato" font-weight="700" font-size="14" fill="#4F46E5">POST /mcp</text>
<text x="352" y="403" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">deja/mcp_http.py</text>
<text x="352" y="421" font-family="Lato" font-weight="700" font-size="13" fill="#B91C1C">HMAC verify → 401</text>
<text x="352" y="437" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">fail-closed · no secret, no service</text>

<!-- arrows into engine -->
<path d="M296 193 H316 V233 H336" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#ag)"/>
<path d="M296 273 H316 V233 H336" stroke="#0D9488" stroke-width="2" fill="none" marker-end="url(#at)"/>
<path d="M296 389 H336" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#ag)"/>

<path d="M536 233 H560 V192 H592" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M536 400 H560 V192 H592" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>

<!-- ================= ENGINE ================= -->
<rect x="576" y="132" width="452" height="600" rx="14" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="596" y="120" font-family="Lato" font-weight="900" font-size="12" letter-spacing="1.6" fill="#4F46E5">ONE ENGINE — BOTH PATHS CONVERGE HERE</text>

<rect x="600" y="160" width="404" height="66" rx="9" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="618" y="186" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">1 · trigger.judge()<tspan font-weight="400" fill="#6366F1">  — Claude</tspan></text>
<text x="618" y="209" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">Is this a decision at all? Noise never reaches search.</text>

<rect x="600" y="256" width="404" height="76" rx="9" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="618" y="282" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">2 · recall()<tspan font-weight="400" fill="#6366F1">  — Slack Real-Time Search</tspan></text>
<text x="618" y="303" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">assistant.search.context · user token · permission-aware</text>
<text x="618" y="321" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">rate-limited ~1 call / few minutes → graceful backoff</text>

<rect x="600" y="362" width="404" height="98" rx="9" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="618" y="388" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">3 · build_arc()<tspan font-weight="400" fill="#6366F1">  — decision state machine</tspan></text>
<text x="618" y="409" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">proposed → adopted → reversed → revived</text>
<text x="618" y="428" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">standing decision is <tspan font-style="italic">derived</tspan>, never guessed · owner via users.info</text>
<text x="618" y="447" font-family="Lato" font-weight="400" font-size="13" fill="#64748B">times_discussed + sources[] — always from the retrieved arc</text>

<rect x="600" y="490" width="404" height="98" rx="9" fill="#1E1B4B"/>
<text x="618" y="518" font-family="Lato" font-weight="900" font-size="15" fill="#FFFFFF">4 · GROUNDING GATE</text>
<text x="618" y="541" font-family="Lato" font-weight="400" font-size="13" fill="#A5B4FC">distinctive subject word present in the retrieved thread</text>
<text x="618" y="559" font-family="Lato" font-weight="400" font-size="13" fill="#A5B4FC">AND a real decision sentence  AND a clickable permalink</text>
<text x="618" y="577" font-family="Lato" font-weight="700" font-size="13" fill="#FFFFFF">AND badge ≤ sources</text>

<rect x="600" y="618" width="404" height="90" rx="9" fill="#FFFFFF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="618" y="644" font-family="Lato" font-weight="700" font-size="15" fill="#1E1B4B">5 · govern.check() → verdict</text>
<circle cx="626" cy="668" r="5" fill="#059669"/><text x="640" y="673" font-family="Lato" font-weight="700" font-size="14" fill="#059669">ALLOW</text>
<circle cx="726" cy="668" r="5" fill="#D97706"/><text x="740" y="673" font-family="Lato" font-weight="700" font-size="14" fill="#B45309">CONFLICTS</text>
<circle cx="856" cy="668" r="5" fill="#94A3B8"/><text x="870" y="673" font-family="Lato" font-weight="700" font-size="14" fill="#64748B">INCONCLUSIVE</text>
<text x="618" y="697" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">gate fails → INCONCLUSIVE. A sourceless verdict is never emitted.</text>

<path d="M802 226 V256" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M802 332 V362" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M802 460 V490" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>
<path d="M802 588 V618" stroke="#4F46E5" stroke-width="2.2" fill="none" marker-end="url(#ai)"/>

<!-- silent short-circuit -->
<path d="M1004 193 H1076" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#ag)"/>
<rect x="1084" y="166" width="256" height="54" rx="9" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="1100" y="190" font-family="Lato" font-weight="700" font-size="14" fill="#64748B">not a decision → SILENT</text>
<text x="1100" y="209" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">no search, no LLM cost, no message</text>

<!-- ================= OUTPUT ================= -->
<text x="1084" y="290" font-family="Lato" font-weight="900" font-size="12" letter-spacing="1.6" fill="#94A3B8">WHAT COMES OUT</text>

<rect x="1084" y="306" width="460" height="128" rx="9" fill="#FFFFEF" stroke="#D97706" stroke-width="1.5"/>
<text x="1102" y="332" font-family="Lato" font-weight="900" font-size="15" fill="#B45309">CONFLICTS  →  deja/card.py</text>
<text x="1102" y="356" font-family="Lato" font-weight="400" font-size="13" fill="#475569">Block Kit card in-thread: standing decision · owner · date</text>
<text x="1102" y="375" font-family="Lato" font-weight="400" font-size="13" fill="#475569">“this has come up 4×” — with all 4 clickable sources</text>
<text x="1102" y="399" font-family="Lato" font-weight="400" font-size="13" fill="#475569">[ Ask the owner ]   [ Open thread ]   [ Save ]</text>
<text x="1102" y="421" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">Save → Slack Canvas decision log + App Home</text>

<rect x="1084" y="450" width="460" height="58" rx="9" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
<text x="1102" y="474" font-family="Lato" font-weight="900" font-size="15" fill="#047857">ALLOW  →  nothing is posted</text>
<text x="1102" y="495" font-family="Lato" font-weight="400" font-size="13" fill="#475569">Silence is the product working. The channel stays clean.</text>

<rect x="1084" y="524" width="460" height="58" rx="9" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="1102" y="548" font-family="Lato" font-weight="900" font-size="15" fill="#475569">INCONCLUSIVE</text>
<text x="1102" y="569" font-family="Lato" font-weight="400" font-size="13" fill="#475569">“discussed, never landed. I won’t invent one.”</text>

<rect x="1084" y="598" width="460" height="86" rx="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
<text x="1102" y="622" font-family="Lato" font-weight="900" font-size="15" fill="#4F46E5">MCP response  →  back to the caller</text>
<text x="1102" y="644" font-family="Lato" font-weight="400" font-size="12.5" fill="#475569">{ verdict, standing_decision, owner, decided_at,</text>
<text x="1102" y="662" font-family="Lato" font-weight="400" font-size="12.5" fill="#475569">  times_discussed, sources[], rationale }</text>
<text x="1102" y="678" font-family="Lato" font-weight="400" font-size="12" fill="#94A3B8">Slackbot renders it as “Used … from Deja MCP”</text>

